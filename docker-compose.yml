services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-backend
    command: uvicorn main:api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrag-frontend
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      BACKEND_URL: http://backend:8000/ask
    depends_on:
      - backend
    ports:
      - "8501:8501"
